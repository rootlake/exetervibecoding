<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dining Hall Tier List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f4f4;--panel:#fff;--ink:#111;--muted:#5c5c5c;--line:rgba(0,0,0,.12);
  --accent:#8C1D18;--shadow:0 2px 8px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
header{
  background:var(--panel);border-bottom:1px solid var(--line);
  padding:1rem 1.25rem;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:.75rem;
}
header h1{font-size:1.35rem;font-weight:700}
header p{font-size:.9rem;color:var(--muted)}
.toolbar{display:flex;gap:.5rem;flex-wrap:wrap}
.btn{
  font:inherit;font-size:.85rem;font-weight:600;
  background:var(--panel);color:var(--ink);border:1px solid var(--line);
  border-radius:6px;padding:.45rem .75rem;cursor:pointer;
}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{filter:brightness(1.06)}
main{max-width:920px;margin:0 auto;padding:1rem 1.25rem 1.5rem;display:flex;flex-direction:column;gap:.65rem}
.tier{display:grid;grid-template-columns:52px 1fr;min-height:72px;border:1px solid var(--line);background:var(--panel);box-shadow:var(--shadow)}
.tier-label{
  display:flex;align-items:center;justify-content:center;
  font-size:1.75rem;font-weight:800;color:#111;border-right:1px solid rgba(0,0,0,.08);
}
.tier-items{
  display:flex;flex-wrap:wrap;align-content:flex-start;align-items:flex-start;
  gap:.45rem;padding:.55rem;min-height:70px;background:rgba(255,255,255,.55);
}
.tier-items.drag-over{outline:2px dashed var(--accent);outline-offset:-2px;background:rgba(140,29,24,.04)}
.pool-wrap{
  margin-top:.35rem;background:var(--panel);border:1px solid var(--line);
  border-radius:8px;padding:.75rem;box-shadow:var(--shadow);
}
.pool-wrap h2{font-size:.78rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.55rem}
.pool{display:flex;flex-wrap:wrap;gap:.45rem;min-height:52px;padding:.25rem}
.pool.drag-over{outline:2px dashed var(--accent);outline-offset:-2px;border-radius:6px}
.item{
  font-size:.82rem;font-weight:600;line-height:1.2;
  background:#fff;border:1px solid var(--line);border-radius:6px;
  padding:.45rem .65rem;cursor:grab;user-select:none;box-shadow:0 1px 2px rgba(0,0,0,.06);
}
.item:active{cursor:grabbing}
.item.dragging{opacity:.45}
.item.premium{border-color:var(--accent);color:var(--accent)}
footer{text-align:center;font-size:.78rem;color:var(--muted);padding:1rem;border-top:1px solid var(--line);background:var(--panel)}
</style>
</head>
<body>
<header>
<div>
<h1>Dining Hall Tier List</h1>
<p>Drag each item into S · A · B · C · D · F</p>
</div>
<div class="toolbar">
<button class="btn" type="button" id="resetBtn">Reset</button>
<button class="btn primary" type="button" onclick="window.print()">Print</button>
</div>
</header>
<main id="board"></main>
<div class="pool-wrap" style="max-width:920px;margin:0 auto 1.5rem;padding:0 1.25rem 1.25rem">
<h2>Unranked — drag to rank</h2>
<div class="pool" id="pool" data-zone="pool"></div>
</div>
<footer>One HTML file · edit items in data/game-demo-data.js</footer>
<script src="data/game-demo-data.js"></script>
<script>
const board = document.getElementById('board');
const pool = document.getElementById('pool');
let dragEl = null;

function makeItem(name) {
  const el = document.createElement('div');
  el.className = 'item' + (name === 'Lobster' || name === 'Filet Mignon' ? ' premium' : '');
  el.textContent = name;
  el.draggable = true;
  el.dataset.item = name;
  el.addEventListener('dragstart', e => {
    dragEl = el;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', name);
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    dragEl = null;
    document.querySelectorAll('.drag-over').forEach(z => z.classList.remove('drag-over'));
  });
  return el;
}

function wireZone(zone) {
  zone.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    zone.classList.add('drag-over');
  });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    if (!dragEl) return;
    zone.appendChild(dragEl);
  });
}

function buildBoard() {
  board.innerHTML = '';
  TIERS.forEach(tier => {
    const row = document.createElement('div');
    row.className = 'tier';
    row.innerHTML = '<div class="tier-label"></div><div class="tier-items"></div>';
    row.querySelector('.tier-label').textContent = tier.label;
    row.querySelector('.tier-label').style.background = tier.color;
    const zone = row.querySelector('.tier-items');
    zone.dataset.zone = tier.id;
    wireZone(zone);
    board.appendChild(row);
  });
}

function resetAll() {
  pool.innerHTML = '';
  FOOD_ITEMS.forEach(name => pool.appendChild(makeItem(name)));
}

wireZone(pool);
buildBoard();
resetAll();
document.getElementById('resetBtn').addEventListener('click', resetAll);
</script>
</body>
</html>
